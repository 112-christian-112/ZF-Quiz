<script>
var Q=[{"q": "Nach dem Auslösen einer Gas-Löschanlage mit dem Löschmittel CO2 ...", "opts": ["muss die Einsatzleiterin oder der Einsatzleiter der Feuerwehr den betroffenen Bereich sofort belüften lassen, da sich dort ggf. noch Personen aufhalten.", "dürfen Lüftungsmaßnahmen erst nach Kontrolle des betroffenen Bereiches eingeleitet werden, um Rückzündungen zu verhindern.", "ist die Aussicht auf Erfolg für die Rettung betroffener Personen als derart gering einzuschätzen, dass das Risiko eines Aufflammens oder einer Brandausbreitung als größte Gefahr anzusehen sind.", "ist die zuständige Umweltbehörde zu benachrichtigen."], "correct": 1}, {"q": "Markieren Sie die zutreffende Aussage! (FwDV 100 / Einsatzleitung)", "opts": ["Eine Einsatzleitung im Sinne der FwDV 100 besteht nur aus einer Person (der Einsatzleiterin oder dem Einsatzleiter). Die weitere Besatzung eines Führungsfahrzeuges gehört nicht zur Einsatzleitung.", "Einsatzleiterinnen und Einsatzleiter kleinerer Einheiten, z. B. eines oder zweier Fahrzeuge, führen ohne Führungseinheit. Größere Einheiten werden mit einer Führungseinheit geführt. Die kleinste Führungseinheit gemäß FwDV 100 besteht aus drei Funktionen.", "Einsatzleiterinnen und Einsatzleiter der Führungsstufen A und B führen ohne Führungseinheiten.", "Führungseinheiten werden nur bei zeitlich länger dauernden Einsätzen benötigt."], "correct": 1}, {"q": "Sie werden zu einem Verkehrsunfall alarmiert, der ABC-Zug ist ebenfalls auf Anfahrt. An der Einsatzstelle kommt der LKW-Fahrer auf Sie zu. Er erklärt, er hat größere Mengen Eisen-III-Chlorid Lösung geladen, die mit ca. 30 l/min aus dem Tank austreten. Es sind keine betroffenen Personen mehr im Gefahrenbereich. Für welche Maßnahme entscheiden Sie sich?", "opts": ["Trupp unter PA zur Erkundung der Leckage vorschicken.", "Trupp unter PA mit Schuttmulde zum Auffangen des Stoffes vorschicken.", "Gefahrenbereich absperren, Außerhalb des Gefahrenbereichs weiter erkunden, ABC-Zug einweisen.", "Meldung an Leitstelle und auf Eintreffen des ABC-Zug warten."], "correct": 2}, {"q": "In welche Gefahrengruppe werden Einsätze im Zusammenhang mit Transporten gefährlicher Güter laut FwDV 500 eingeordnet?", "opts": ["Gefahrengruppe I", "Gefahrengruppe II", "Gefahrengruppe III", "Gefahrengruppe IV"], "correct": 1}, {"q": "In der Feuerwehr wird eine neue Ausbilderin oder ein neuer Ausbilder gesucht, über welche Eigenschaften sollte eine gute Ausbilderin oder ein guter Ausbilder verfügen?", "opts": ["Amtskompetenz, Arbeitskompetenz", "Methodenkompetenz, Fachkompetenz", "Fahrkompetenz, Redekompetenz", "Lesekompetenz, Führungskompetenz"], "correct": 1}, {"q": "Mit welchem Fahrzeug mit Normbeladung können zur selben Zeit zwei Rufgruppen im Digitalfunk über MRT genutzt werden?", "opts": ["KdoW", "ELW1", "LF10", "TSF"], "correct": 1}, {"q": "Ab welcher Führungsstufe ist der Einsatz eines ELW 2 sinnvoll?", "opts": ["Führungsstufe A", "Führungsstufe B", "Führungsstufe C", "Führungsstufe D"], "correct": 2}, {"q": "Sie fahren mit Ihren unterstellten Einheiten zu einem Hochwassereinsatz nach Bayern. Wie kommunizieren Sie über Funk während der gesamten Fahrt mit Ihren Einheiten/Fahrzeugen?", "opts": ["In der Hauptrufgruppe des eigenen Landkreises.", "In der Rufgruppe \\u201eZusArb\\u201d des anfordernden Landkreises.", "In der Rufgruppe \\u201eMarschkanal\\u201d in der Betriebsart TMO.", "In der Rufgruppe \\u201eMarschkanal\\u201d in der Betriebsart DMO."], "correct": 3}, {"q": "Der Löschzug rückt während eines Unwetters nach einem Blitzeinschlag zu einem Brand in einem Wohnhaus aus. Nach dem Eintreffen und der Erkundung stellt der Zugführer fest, dass es sich bei dem Gebäude um ein Fertighaus in Holzrahmenbauart handelt. Flammen sind noch nicht zu sehen, aus verschiedenen Stellen des Hauses dringt leicht Rauch. Welche Taktik ist für die Brandbekämpfung anzuwenden?", "opts": ["Die raumabschließenden Bauteile sind gezielt zu öffnen, um eine gezielte Brandbekämpfung durchführen zu können.", "Ein Öffnen von Wänden und Decken ist aufgrund der Sauerstoffzufuhr und einer damit verbundenen Durchzündung zu vermeiden.", "Das Dach ist zu öffnen, um eine gezielte Brandbekämpfung durchführen zu können.", "Auf ein Öffnen von Wänden und Decken kann verzichtet werden, wenn eine Wärmebildkamera genutzt wird."], "correct": 0}, {"q": "Sie sind als Einsatzleiterin oder Einsatzleiter an einer Einsatzstelle tätig. Ihnen gefällt nicht, wie Ihre Gruppenführerinnen und Gruppenführer an der Umsetzung Ihrer Befehle arbeitet und Sie fürchten, dass Sie auf diese Weise nicht Ihr Einsatzziel erreichen. Wie gehen Sie damit um?", "opts": ["Sie entscheiden sich, das Ganze selber in die Hand zu nehmen und unterstützen tatkräftig Ihre untergeordneten Einsatzkräfte bei der Umsetzung der befohlenen Maßnahmen, um ihnen auch zu zeigen, wie Sie sich die Umsetzung gedacht haben.", "Sie sehen ein, dass Ihre Gruppenführerinnen und Gruppenführer nicht dazu in der Lage sind Ihre Befehle auszuführen und versuchen Ihre Zuständigkeit an jemand anderes abzutreten.", "Sie überdenken im Rahmen Ihres nächsten Durchganges des Führungsvorganges Ihre Maßnahmen und geben entsprechend angepasste Befehle, um die Tätigkeiten Ihrer Gruppenführerinnen und Gruppenführer in die richtige Richtung zu lenken.", "Sie lassen alles so weiterlaufen, wie es ist, da Ihre Gruppenführerinnen und Gruppenführer selber erkennen müssen, dass diese falsch handeln. Dabei lernen sie auch gleich aus ihren Fehlern."], "correct": 2}, {"q": "Sie wurden zu einem Industriebrand alarmiert. Nach einer ausführlichen Erkundung stehen Sie nun vor dem Halleneingang des Industriebetriebes und erkennen eine starke Rauchentwicklung im Deckenbereich der Halle in Stahlskelettbauweise. Welche Einrichtung des vorbeugenden Brandschutzes kann Ihre einsatztaktischen Maßnahmen positiv beeinflussen?", "opts": ["Das Auslösen einer Brandmeldeanlage während der Brandbekämpfung", "Die Inbetriebnahme von Rauch- und Wärmeabzügen", "Einleiten von Lüftungsmaßnahmen mit dem Lüfter des Löschfahrzeuges", "Eine umfangreiche Brandbekämpfung mit mehreren Rohren"], "correct": 1}, {"q": "Niedersächsische Kreisfeuerwehrbereitschaften sind ...", "opts": ["Verbände, die aus bis zu fünf Zügen bestehen, innerhalb von zwei Stunden abmarschbereit sein müssen und in der Lage sind, am Einsatzort mindestens vier Stunden autark zu arbeiten.", "Verbände, die aus bis zu fünf Zügen bestehen, sofort abmarschbereit sein müssen und in der Lage sind, am Einsatzort mindestens vier Stunden autark zu arbeiten.", "Verbände, die aus bis zu fünf Zügen bestehen, innerhalb von vier Stunden abmarschbereit sein müssen und in der Lage sind, am Einsatzort mindestens achtundvierzig Stunden autark, das heißt ohne eine Versorgung von außen, zu arbeiten.", "lose Zusammenschlüsse von Einzelfahrzeugen verschiedener Freiwilliger Feuerwehren, die innerhalb von zwei Stunden abmarschbereit sein müssen und in der Lage sind, am Einsatzort mindestens vierundzwanzig Stunden autark, das heißt ohne eine Versorgung von außen, zu arbeiten."], "correct": 0}, {"q": "Einsatzpläne ...", "opts": ["enthalten einsatztaktische Hinweise. Ihnen liegt immer ein Feuerwehrplan zugrunde.", "sind objekt- oder ereignisbezogene Pläne und enthalten einsatztaktische Hinweise.", "sind objekt- oder ereignisbezogene Pläne und können einsatztaktische Hinweise enthalten.", "enthalten einsatztaktische Hinweise. Sie beziehen sich lediglich auf Ereignisse, nicht auf bestimmte Objekte."], "correct": 1}, {"q": "Welche Zusammenstellung von Einsatzfahrzeugen ist für den Einsatz \\u201eBrand eines LKW\\u201d außerhalb geschlossener Ortschaften am sinnvollsten?", "opts": ["MTW, LF 20, TLF 2000", "TSF, TSF-W, TLF 2000", "LF 10, TLF 3000, TLF 4000", "ELW 1, HLF 20, TLF 2000, TLF 4000"], "correct": 3}, {"q": "Das Betroffene Objekt besteht aus drei durch Brandwände voneinander abgetrennte Lagerhallen. Die Halle II ist durch feuerbeständige Wände in einzelne Abschnitte unterteilt. Einer dieser Abschnitte steht in Vollbrand. Was bedeutet das für Ihre Einsatztaktik?", "opts": ["Eine Brandausbreitung auf andere Abschnitte ist auszuschließen.", "Eine Brandausbreitung auf andere Lagerhallen ist unwahrscheinlich.", "Eine Brandausbreitung auf andere Lagerhallen ist für 60 Minuten auszuschließen.", "Eine Brandausbreitung auf andere Abschnitte ist für 90 Minuten ausgeschlossen."], "correct": 3, "svg": "lagerhallen"}, {"q": "Die Genehmigung für eine Kolonnenfahrt ist zu beantragen ...", "opts": ["bei der Straßenverkehrsbehörde (z.B. Landkreis), in deren Zuständigkeitsbereich die Kolonnenfahrt beginnt.", "bei der FEL, in deren Zuständigkeitsbereich die Kolonnenfahrt beginnt.", "bei der Straßenverkehrsbehörde, in deren Zuständigkeitsbereich die Kolonnenfahrt führt.", "sofern die Einsatzfahrzeuge nicht entsprechend gekennzeichnet sind."], "correct": 0}, {"q": "Markieren Sie die zutreffende Aussage! (Führungsstufen)", "opts": ["Die Führungsstufe B beschreibt die Einsatzleitung mit Führungsstab.", "Die Führungsstufe C beschreibt die Einsatzleitung mit Führungsgruppe.", "Die Führungsstufe C beschreibt die Einsatzleitung mit einem Führungsassistenten.", "Die Führungsstufe B beschreibt die Einsatzleitung ohne Führungseinheit."], "correct": 1}, {"q": "Ein Löschfahrzeug rückt zu einem Containerbrand aus. Der Container, etwa 5 m³, steht im Abstand von etwa zwei Metern vor einem Wohnhaus (drei Obergeschosse und Dachstuhl mit Satteldach) und brennt in voller Ausdehnung, Teile der Fassade bis zum 3. Obergeschoss brennen ebenfalls. Was könnte die Ursache sein? Welche Gefahren sind erkannt?", "opts": ["Es brennt ein Wärmedämmverbundsystem aus Polystyrol. Mit einer weiteren Ausbreitung des Brandes auch in das Dach und in die Wohnungen ist zu rechnen. Damit besteht eine Gefahr der Ausbreitung für die Bewohner des Hauses.", "Es handelt sich um eine brennbare Fassade mit normaler Brandausbreitung. Die Bewohner des Hauses sind bei geschlossenen Fenstern außer Gefahr. Der Dachstuhl ist gegen eine Ausbreitung des Brandes durch feuerhemmende Schicht geschützt.", "Es handelt sich um eine brennbare Fassade mit normaler Brandausbreitung. Die Bewohner des Hauses sind bei geöffneten Fenstern in Gefahr. Durch senkrechte Streifen aus nichtbrennbaren Baustoffen besteht keine Gefahr der weiteren Ausbreitung des Brandes nach links und rechts.", "Hinter der Fassade gibt es eine Schicht aus nichtbrennbaren Baustoffen, die den Brand aufhalten soll. Eine Gefahr der Ausbreitung in das Dach besteht nicht. Die Bewohner des Hauses sind bei geschlossenen Fenstern außer Gefahr."], "correct": 0}, {"q": "Räumlich ausgedehnte Einsatzstellen sind ...", "opts": ["grundsätzlich von außen nach innen bzw. von vorn nach hinten abzuarbeiten.", "meistens durch einen einberufenen Führungsstab HVB zu führen.", "in der Regel in Abschnitte zu unterteilen.", "grundsätzlich mit dem KdoW zu erkunden."], "correct": 2}, {"q": "Eine Einsatzleiterin oder ein Einsatzleiter der Feuerwehr ist gegenüber allen bei der Gefahrenabwehr beteiligten Stellen ...", "opts": ["weisungsbefugt, auch in deren interne Zuständigkeiten.", "koordinierend tätig.", "nur bei gegenwärtiger Gefahr weisungsbefugt.", "jederzeit Rechenschaft schuldig."], "correct": 1}, {"q": "Im Einsatzdienst mit Ihrer Feuerwehr, in welcher Sie als Führungskraft tätig sind, ist Ihnen aufgefallen, dass einige Kameraden und Kameradinnen in belastenden Einsatzsituationen eine besonders \\u201eharte Schale\\u201d mimen und die Situationen im Nachgang häufig übertrieben verharmlosen. Sie befürchten, dass dieses Verhalten nicht der wirklichen Verfassung der Kameradinnen und Kameraden entspricht, und sie dieses nur tun, um nicht als \\u201eSchwächling\\u201d abgestempelt zu werden. Wie können Sie mit dieser Situation umgehen?", "opts": ["Sie erklären Ihren Kameradinnen und Kameraden, dass ihr Verhalten überhaupt nicht zu ihrer inneren Verfassung passen kann und suchen Hilfe bei einem Psychotherapeuten für die Betroffenen.", "Sie integrieren die Thematik \\u201ePsychosoziale Herausforderungen im Feuerwehrdienst\\u201d in der Ausbildung im Rahmen des normalen Einsatzdienstes, um langfristig das Thema innerhalb Ihrer Feuerwehr zu enttabuisieren.", "Sie unternehmen nichts, da es sich hier um ein sensibles Thema handelt und sich Ihre Kameradinnen und Kameraden angegriffen fühlen könnten, wenn Sie ihr Verhalten auf irgendeine Weise thematisieren.", "Sie schicken die entsprechenden Kameradinnen und Kameraden in besonders belastenden Situationen bevorzugt in den Einsatz, damit sie selber den nötigen Respekt vor belastenden Situationen entwickeln."], "correct": 1}, {"q": "Welche Aussage über TUIS ist richtig?", "opts": ["TUIS wird über die Leitstelle in Anspruch genommen. Die erste Stufe bedeutet: Personelle Unterstützung.", "TUIS wird über die Leitstelle in Anspruch genommen. Die erste Stufe bedeutet: Materielle Unterstützung.", "TUIS wird über die Leitstelle in Anspruch genommen. Die erste Stufe bedeutet: Personelle und materielle Unterstützung.", "TUIS wird über die Leitstelle in Anspruch genommen. Die erste Stufe bedeutet telefonische Unterstützung."], "correct": 3}, {"q": "Welche Befugnisse des Einsatzleitenden können ein Grundrecht einschränken?", "opts": ["Sicherungsmaßnahmen treffen", "Grundstücke und Gebäude zur Brandbekämpfung oder zur Hilfeleistung betreten", "Personen zur Hilfe verpflichten", "alle genannten Antwortmöglichkeiten"], "correct": 3}, {"q": "Was bedeutet Führen?", "opts": ["Führen ist die Einflussnahme auf das Verhalten anderer Menschen, um ein gesetztes Ziel zu erreichen.", "Führen bedeutet die Übernahme des Denkens für alle untergeordneten Personen.", "Führen bedeutet, dass alle Beteiligten sich bedingungslos nach den Ansagen einer einzelnen Person zu richten haben.", "Führen ist eine Art des dominanten zwischenmenschlichen Verhaltens, welches im allgemeinen Miteinander zu vermeiden ist, um die Atmosphäre einer sozialen Gruppierung nicht zu beeinträchtigen."], "correct": 0}, {"q": "Die Ortsfeuerwehr A einer Gemei function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function build(){
  var c=document.getElementById('quiz');
  c.innerHTML='';
  document.querySelector('#sc-o .sv').textContent=Q.length;

  for(var qi=0;qi<Q.length;qi++){
    (function(qi){
      var q=Q[qi];
      var card=document.createElement('div');
      card.className='card';
      card.id='card'+qi;

      var qhead=document.createElement('div');
      qhead.className='qhead';
      qhead.innerHTML='<span class="qn">F '+(qi+1)+'</span><span class="qt">'+esc(q.q)+'</span>';
      card.appendChild(qhead);

      if(q.svg && SVGS[q.svg]){
        var imgd=document.createElement('div');
        imgd.className='qimg';
        imgd.innerHTML=SVGS[q.svg];
        card.appendChild(imgd);
      }

      var opts=document.createElement('div');
      opts.className='opts';
      for(var oi=0;oi<q.opts.length;oi++){
        (function(oi){
          var btn=document.createElement('button');
          btn.className='opt';
          btn.innerHTML='<span class="oi">&#9675;</span><span>'+esc(q.opts[oi])+'</span>';
          btn.addEventListener('click',function(){answer(qi,oi);});
          opts.appendChild(btn);
        })(oi);
      }
      card.appendChild(opts);

      var fb=document.createElement('div');
      fb.className='fb';
      fb.id='fb'+qi;
      card.appendChild(fb);

      c.appendChild(card);
    })(qi);
  }

  var sum=document.getElementById('summary');
  if(sum) sum.style.display='none';
}

function answer(qi,oi){
  if(A[qi]!==null) return;
  A[qi]=oi;
  var q=Q[qi];
  var card=document.getElementById('card'+qi);
  var btns=card.querySelectorAll('.opt');
  var fb=document.getElementById('fb'+qi);

  for(var i=0;i<btns.length;i++){
    btns[i].disabled=true;
    var ic=btns[i].querySelector('.oi');
    if(i===q.correct && i===oi){btns[i].classList.add('correct');ic.textContent='✓';}
    else if(i===oi){btns[i].classList.add('wrong');ic.textContent='✗';}
    else if(i===q.correct){btns[i].classList.add('reveal');ic.textContent='✓';}
  }

  if(oi===q.correct){
    card.classList.add('ok');
    fb.textContent='✓ Richtig!';
    fb.className='fb show ok';
  } else {
    card.classList.add('nok');
    fb.textContent='✗ Falsch – die richtige Antwort ist grün markiert.';
    fb.className='fb show nok';
  }

  updateScore();
  var allDone=true;
  for(var i=0;i<A.length;i++){if(A[i]===null){allDone=false;break;}}
  if(allDone) setTimeout(showSummary,500);
}

function updateScore(){
  var r=0,w=0,o=0;
  for(var i=0;i<A.length;i++){
    if(A[i]===null) o++;
    else if(A[i]===Q[i].correct) r++;
    else w++;
  }
  document.querySelector('#sc-r .sv').textContent=r;
  document.querySelector('#sc-w .sv').textContent=w;
  document.querySelector('#sc-o .sv').textContent=o;
  document.getElementById('pbar').style.width=((Q.length-o)/Q.length*100)+'%';
}

function showSummary(){
  var r=0;
  for(var i=0;i<A.length;i++){if(A[i]===Q[i].correct) r++;}
  var pct=Math.round(r/Q.length*100);
  var col=pct>=75?'#22c55e':pct>=50?'#f5a623':'#ef4444';
  var msg=pct>=75?'&#x1F389; Sehr gut!':pct>=50?'&#x1F4DA; Weiter üben!':'&#x1F504; Nochmals versuchen!';

  var sum=document.getElementById('summary');
  if(!sum){
    sum=document.createElement('div');
    sum.id='summary';
    document.getElementById('quiz').appendChild(sum);
  }
  sum.innerHTML='<h2>Auswertung</h2>'
    +'<div id="sum-score" style="color:'+col+'">'+r+' / '+Q.length+'</div>'
    +'<div id="sum-sub">'+pct+'% richtig &nbsp;&middot;&nbsp; '+msg+'</div>'
    +'<button id="restart" onclick="restart()">&#x1F504; Nochmals starten</button>';
  sum.style.display='block';
  sum.scrollIntoView({behavior:'smooth'});
}

function restart(){
  for(var i=0;i<A.length;i++) A[i]=null;
  build();
  updateScore();
  window.scrollTo(0,0);
}

build();
updateScore();
